<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador Chatbot — Grupo Extrema - Criado por Willian dos Santos</title>
  <!-- 🎨 Conecta o CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page-title">Simulador Chatbot — Grupo Extrema - Criado por Willian dos Santos</div>

  <div class="wa-phone">
    <div class="wa-header">
      <div class="wa-avatar">GE</div>
      <div>
        <div class="wa-header-name">Grupo Extrema</div>
        <div class="wa-header-status">online</div>
      </div>
    </div>
    <div class="wa-messages" id="chat"></div>
    <div class="wa-input-area">
      <input class="wa-input" id="inp" placeholder="Digite uma mensagem..."
             onkeydown="if(event.key==='Enter') sendMsg()"/>
      <button class="wa-send" onclick="sendMsg()">&#10148;</button>
    </div>
  </div>

  <button class="reset-btn" onclick="resetChat()">↺ Reiniciar conversa</button>

  <!-- ⚙️ Conecta o JS  sempre no final do body -->
  <script src="script.js"></script>
</body>
</html>
